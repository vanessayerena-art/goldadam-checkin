<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gold Adam KO – Check In</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
.app{width:100%;max-width:680px;min-height:100vh;display:flex;flex-direction:column;}

/* ── WELCOME SCREEN ── */
.welcome-screen{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;transition:opacity 0.6s;}
.welcome-screen.hide{opacity:0;pointer-events:none;}
.welcome-logo{width:110px;height:110px;margin-bottom:28px;animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
.welcome-gold-line{width:60px;height:2px;background:#c9a84c;margin:0 auto 20px;}
.welcome-title{font-family:'Arial Narrow','Impact','Helvetica Neue',sans-serif;font-size:52px;letter-spacing:4px;color:#c9a84c;line-height:1;text-align:center;}
.welcome-sub{font-size:14px;color:#888;letter-spacing:4px;text-transform:uppercase;margin-top:8px;text-align:center;}
.welcome-dates{font-size:13px;color:#c9a84c;letter-spacing:3px;margin-top:10px;opacity:0.7;text-align:center;}
.welcome-divider{width:1px;height:40px;background:linear-gradient(to bottom,transparent,#c9a84c,transparent);margin:28px auto;}
.welcome-cta{font-size:13px;color:#555;letter-spacing:3px;text-transform:uppercase;text-align:center;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:0.4;}50%{opacity:1;}}
.welcome-btn{margin-top:32px;background:transparent;border:1.5px solid #c9a84c;border-radius:8px;padding:16px 48px;font-family:'Arial Narrow','Impact','Helvetica Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#c9a84c;cursor:pointer;transition:all 0.2s;}
.welcome-btn:active{background:#c9a84c;color:#0a0a0a;}

/* ── HEADER ── */
.header{background:#0a0a0a;padding:28px 24px 20px;text-align:center;border-bottom:2px solid #c9a84c;}
.logo-area{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:6px;}
.logo-svg{width:66px;height:66px;}
.event-title{font-family:'Arial Narrow','Impact','Helvetica Neue',sans-serif;font-size:30px;letter-spacing:2px;color:#c9a84c;line-height:1;}
.event-sub{font-size:13px;color:#888;letter-spacing:3px;text-transform:uppercase;margin-top:4px;}
.event-dates{font-size:12px;color:#c9a84c;letter-spacing:2px;margin-top:5px;opacity:0.75;}

/* ── TABS ── */
.tabs{display:flex;margin:20px 24px 0;border:1.5px solid #c9a84c;border-radius:6px;overflow:hidden;}
.tab{flex:1;padding:13px;text-align:center;font-family:'Arial Narrow','Impact','Helvetica Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;background:transparent;color:#c9a84c;border:none;transition:all 0.2s;}
.tab.active{background:#c9a84c;color:#0a0a0a;}
.tab-div{width:1.5px;background:#c9a84c;}

/* ── SEARCH ── */
.search-wrap{padding:20px 24px 10px;}
.search-box{position:relative;}
.search-box input{width:100%;padding:15px 50px 15px 18px;background:#1a1a1a;border:1.5px solid #333;border-radius:8px;color:#fff;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;font-size:20px;outline:none;transition:border 0.2s;}
.search-box input::placeholder{color:#444;}
.search-box input:focus{border-color:#c9a84c;}
.s-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#555;font-size:22px;pointer-events:none;}

/* ── LIST ── */
.results{padding:0 24px;flex:1;}
.result-count{font-size:12px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;padding-left:2px;height:20px;}
.name-card{background:#141414;border:1px solid #2a2a2a;border-radius:10px;padding:18px 20px;margin-bottom:10px;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;justify-content:space-between;}
.name-card:active{transform:scale(0.98);}
.name-card:hover{border-color:#c9a84c;background:#1b190e;}
.name-card.done{border-color:#2e6b2e;background:#0c1e0c;cursor:default;opacity:0.75;}
.name-card.done:hover{border-color:#2e6b2e;background:#0c1e0c;}
.card-name{font-family:'Arial Narrow','Impact','Helvetica Neue',sans-serif;font-size:24px;letter-spacing:1.5px;color:#fff;line-height:1;}
.name-card.done .card-name{color:#999;}
.card-tag{font-size:12px;color:#c9a84c;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;}
.name-card.done .card-tag{color:#555;}
.tap-hint{font-size:11px;color:#444;letter-spacing:1px;text-transform:uppercase;}
.check-badge{width:36px;height:36px;border-radius:50%;background:#1a4a1a;border:1.5px solid #4caf50;display:flex;align-items:center;justify-content:center;}
.check-badge svg{width:18px;height:18px;stroke:#4caf50;stroke-width:2.5;fill:none;}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:#444;}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:0.4;}
.empty-txt{font-size:15px;letter-spacing:1px;line-height:1.6;}

/* ── CONFIRM ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.22s;}
.overlay.show{opacity:1;pointer-events:all;}
.confirm-card{background:#111;border:2px solid #c9a84c;border-radius:16px;padding:40px 32px;text-align:center;max-width:340px;width:90%;transform:scale(0.92);transition:transform 0.22s;}
.overlay.show .confirm-card{transform:scale(1);}
.confirm-star{font-size:50px;margin-bottom:10px;}
.confirm-name{font-family:'Arial Narrow','Impact','Helvetica Neue',sans-serif;font-size:38px;letter-spacing:2px;color:#c9a84c;line-height:1.1;margin-bottom:6px;}
.confirm-tag{font-size:13px;color:#888;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:24px;}
.confirm-btn{background:#c9a84c;color:#0a0a0a;border:none;border-radius:8px;padding:14px 40px;font-family:'Arial Narrow','Impact','Helvetica Neue',sans-serif;font-size:22px;letter-spacing:2px;cursor:pointer;width:100%;margin-bottom:10px;}
.confirm-btn:active{opacity:0.85;}
.cancel-btn{background:transparent;color:#555;border:1px solid #2a2a2a;border-radius:8px;padding:10px;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;font-size:14px;cursor:pointer;width:100%;}
.cancel-btn:hover{color:#888;border-color:#444;}

/* ── SUCCESS ── */
.success-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.93);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.28s;}
.success-overlay.show{opacity:1;}
.success-inner{text-align:center;}
.success-check{width:82px;height:82px;border-radius:50%;background:#1a4a1a;border:2.5px solid #4caf50;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.success-check svg{width:42px;height:42px;stroke:#4caf50;stroke-width:2.5;fill:none;}
.success-name{font-family:'Arial Narrow','Impact','Helvetica Neue',sans-serif;font-size:42px;letter-spacing:3px;color:#fff;margin-bottom:8px;}
.success-msg{font-size:13px;color:#4caf50;letter-spacing:3px;text-transform:uppercase;}

/* ── SETUP ── */
.setup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.97);display:flex;align-items:flex-start;justify-content:center;z-index:300;overflow-y:auto;padding:20px;}
.setup-card{background:#111;border:2px solid #c9a84c;border-radius:16px;padding:32px;width:100%;max-width:600px;margin:auto;}
.setup-title{font-family:'Arial Narrow','Impact','Helvetica Neue',sans-serif;font-size:30px;letter-spacing:2px;color:#c9a84c;margin-bottom:4px;}
.setup-sub{font-size:13px;color:#666;margin-bottom:26px;line-height:1.5;}
.setup-lbl{font-size:12px;color:#c9a84c;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.setup-textarea{width:100%;background:#0a0a0a;border:1px solid #333;border-radius:8px;color:#fff;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;font-size:15px;padding:12px;resize:vertical;min-height:130px;outline:none;line-height:1.7;margin-bottom:6px;}
.setup-textarea:focus{border-color:#c9a84c;}
.setup-hint{font-size:11px;color:#555;margin-bottom:20px;}
.setup-btn{background:#c9a84c;color:#0a0a0a;border:none;border-radius:8px;padding:15px 32px;font-family:'Arial Narrow','Impact','Helvetica Neue',sans-serif;font-size:22px;letter-spacing:2px;cursor:pointer;width:100%;margin-top:4px;}
.setup-btn:active{opacity:0.85;}

/* ── GEAR ── */
.gear-btn{position:fixed;bottom:22px;right:22px;background:#181818;border:1px solid #2a2a2a;border-radius:50%;width:46px;height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;z-index:50;color:#555;}
.gear-btn:hover{border-color:#c9a84c;color:#c9a84c;}
</style>
</head>

<script>
// Names that show "Agent" only (not "Agent Trainee")
var AGENT_ONLY = ['Vanessa Gomez','Shawn Brown','Craig Childs','Joshua Reyes'];

var currentTab='agents', pending=null, pendingTab=null;
var DEFAULT_AGENTS = ["Matt Dawson", "Robert Chaney", "Leland Speed", "Karlie tembo-Jackson", "Leonid Klimanov", "Micheal Brock", "Michael Fernandez", "Juan Carlos Escobar", "Aaron Betchel", "Esgar Delgado", "Sonny Magana", "Andrew Holmgreen", "Rubin Zuniga", "Alison Emmert", "Daniel Ramos", "Tobias Luong", "Joshua Mann", "Marcos Miller", "Dawn Jabour", "Joshua Reyes", "Vanessa Gomez", "Wyatt Proctor", "Shawn Brown", "Craig Childs", "Justin McCray", "Isaiah Buckner", "Keegan Campbell", "Paul Sandhu", "Lassi Mikkola", "Jesse H\u00e4nninen", "Casper James"];
var DEFAULT_STAFF = ["Weston O'neal", "Joy Makanga", "Annina Pierson", "Elias Gould", "Brett Kraklow", "Vanessa Yerena", "Antti Hakli", "Jukka Hotta", "Erik Mertaniemi", "Tero Haikara"];
var data={
  agents: JSON.parse(localStorage.getItem('ga_agents')||'null') || DEFAULT_AGENTS,
  staff:  JSON.parse(localStorage.getItem('ga_staff')||'null') || DEFAULT_STAFF,
  checkedIn: JSON.parse(localStorage.getItem('ga_checkedIn')||'[]')
};

function enterApp(){
  var ws=document.getElementById('welcomeScreen');
  ws.classList.add('hide');
  setTimeout(function(){ws.style.display='none';},650);
  renderList();
}

function parseName(raw){return raw.split('\n').map(function(n){return n.trim();}).filter(function(n){return n.length>0;});}

function saveSetup(){
  data.agents=parseName(document.getElementById('agentInput').value);
  data.staff=parseName(document.getElementById('staffInput').value);
  localStorage.setItem('ga_agents',JSON.stringify(data.agents));
  localStorage.setItem('ga_staff',JSON.stringify(data.staff));
  document.getElementById('setupOverlay').style.display='none';
  renderList();
}
function openSetup(){
  document.getElementById('agentInput').value=data.agents.join('\n');
  document.getElementById('staffInput').value=data.staff.join('\n');
  document.getElementById('setupOverlay').style.display='flex';
}
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-agents').classList.toggle('active',tab==='agents');
  document.getElementById('tab-staff').classList.toggle('active',tab==='staff');
  document.getElementById('searchInput').value='';
  renderList();
}

function getTag(name, tab){
  if(tab==='staff') return 'Gold Adam &middot; Staff';
  // check if this name is in the agent-only list (case-insensitive)
  var lower=name.toLowerCase();
  for(var i=0;i<AGENT_ONLY.length;i++){
    if(AGENT_ONLY[i].toLowerCase()===lower) return 'Gold Adam &middot; Agent';
  }
  return 'Gold Adam &middot; Agent Trainee';
}
function getTagPlain(name, tab){
  if(tab==='staff') return 'Gold Adam · Staff';
  var lower=name.toLowerCase();
  for(var i=0;i<AGENT_ONLY.length;i++){
    if(AGENT_ONLY[i].toLowerCase()===lower) return 'Gold Adam · Agent';
  }
  return 'Gold Adam · Agent Trainee';
}

function renderList(){
  var q=document.getElementById('searchInput').value.toLowerCase().trim();
  var list=currentTab==='agents'?data.agents:data.staff;
  var filtered=q?list.filter(function(n){return n.toLowerCase().indexOf(q)>-1;}):list.slice();
  var container=document.getElementById('nameList');
  var empty=document.getElementById('emptyState');
  var count=document.getElementById('resultCount');
  if(list.length===0){
    container.innerHTML='';empty.style.display='block';
    document.getElementById('emptyTxt').textContent='No names added yet — tap ⚙ to add attendees';
    count.textContent='';return;
  }
  if(filtered.length===0){
    container.innerHTML='';empty.style.display='block';
    document.getElementById('emptyTxt').textContent='No results — try a different name';
    count.textContent='';return;
  }
  empty.style.display='none';
  count.textContent=filtered.length+' '+(currentTab==='agents'?'agents':'staff members')+(q?' found':'');
  container.innerHTML=filtered.map(function(name){
    var key=currentTab+':'+name;
    var done=data.checkedIn.indexOf(key)>-1;
    var safe=name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    var tag=getTag(name,currentTab);
    return '<div class="name-card'+(done?' done':'')+'" '+(done?'':'onclick="showConfirm(\''+safe+'\')"')+'>'
      +'<div><div class="card-name">'+name+'</div><div class="card-tag">'+tag+'</div></div>'
      +'<div>'+(done
        ?'<div class="check-badge"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>'
        :'<span class="tap-hint">Tap to check in</span>')
      +'</div></div>';
  }).join('');
}
function showConfirm(name){
  pending=name;
  pendingTab=currentTab;
  document.getElementById('confirmName').textContent=name;
  document.getElementById('confirmTag').textContent=getTagPlain(name,currentTab);
  document.getElementById('confirmOverlay').classList.add('show');
}
function closeConfirm(){pending=null;pendingTab=null;document.getElementById('confirmOverlay').classList.remove('show');}
function doCheckIn(){
  if(!pending)return;
  var key=pendingTab+':'+pending;
  if(data.checkedIn.indexOf(key)===-1){data.checkedIn.push(key);localStorage.setItem('ga_checkedIn',JSON.stringify(data.checkedIn));}
  var name=pending;
  closeConfirm();
  document.getElementById('successName').textContent=name;
  var el=document.getElementById('successOverlay');el.classList.add('show');
  renderList();
  setTimeout(function(){el.classList.remove('show');},2200);
}
// Don't auto-skip welcome screen on load
</script>
</body>
</html>
